name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC for trusted publishing
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(grep -E '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          INIT_VERSION=$(grep -E '^__version__ = ' propline/__init__.py | sed -E 's/__version__ = "(.*)"/\1/')
          echo "tag: $TAG_VERSION"
          echo "pyproject.toml: $PKG_VERSION"
          echo "__init__.py: $INIT_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ] || [ "$TAG_VERSION" != "$INIT_VERSION" ]; then
            echo "::error::tag, pyproject.toml, and __init__.py must all match"
            exit 1
          fi

      - name: Build
        # `build` and pip-audit are pinned (not `--upgrade`) so the
        # release job can't fetch a freshly published, possibly
        # compromised tool version at publish time — this job produces
        # the wheel that ships to every `pip install propline` user, so
        # it's the one place a bad build-time dep would matter. Bump
        # these deliberately, in step with the Dependabot cooldown:7
        # that already gates their update PRs. (The library's own
        # runtime deps stay unpinned ranges — a library must not lock
        # what it ships.)
        run: |
          python -m pip install build==1.5.0
          python -m build

      - name: Audit Python deps for known CVEs
        # Block publish if any direct or transitive dep has a known
        # CVE. Pairs with Dependabot cooldown (waits 7d before opening
        # update PRs).
        #
        # NOT --strict: installing the package under release puts
        # `propline X.Y.Z` in the env, and that version is by definition
        # not yet on PyPI (this run is what publishes it). --strict turns
        # pip-audit's "could not be audited" warning for the self-package
        # into a hard failure, so --strict makes the workflow incapable
        # of ever shipping a new version. Without --strict, pip-audit
        # still exits non-zero on any real CVE in httpx / transitives —
        # which is the actual security gate we want.
        run: |
          # pip-audit audits the whole environment, which includes the
          # runner's own pip — a CVE in that pip (e.g. PYSEC-2026-196 in
          # 26.1.1, fixed in 26.1.2) would otherwise block an unrelated
          # release. Upgrade pip first so the gate reflects OUR deps, not
          # the runner image's pip version.
          python -m pip install --upgrade pip
          pip install pip-audit==2.10.0
          pip install .
          pip-audit

      - name: Publish
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
